name: Build Linux

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake \
            build-essential \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libasound2-dev \
            libgtk-3-dev

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP 'project\(Ebauche VERSION \K[0-9.]+' CMakeLists.txt)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifact
        run: |
          V=${{ steps.version.outputs.VERSION }}
          mkdir -p dist
          cp build/Ebauche dist/ebauche_$V
          chmod +x dist/ebauche_$V
          cp imgui.ini dist/imgui.ini
          cp -r resources dist/resources

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebauche-linux-${{ steps.version.outputs.VERSION }}
          path: dist/

      - name: Archive for Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist
          tar -czvf ../ebauche-linux-${{ steps.version.outputs.VERSION }}.tar.gz *

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ebauche-linux-${{ steps.version.outputs.VERSION }}.tar.gz
